<!-- Share Card Button -->
<style>
.share-card-wrapper {
    margin: 0 0 1.5rem 0;
}
.share-card-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    font-size: 14px;
    color: #555;
    background: transparent;
    border: 1px solid #d0d0d0;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    line-height: 1;
}
.share-card-btn:hover {
    color: #4a90d9;
    border-color: #4a90d9;
    background: rgba(74, 144, 217, 0.05);
}
.share-card-btn svg {
    flex-shrink: 0;
}
</style>

<div class="share-card-wrapper">
  <button class="share-card-btn" onclick="generateShareCard()" title="生成分享图片">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <span>生成分享图</span>
  </button>
</div>

<!-- Hidden card used for rendering the share image -->
<div id="share-card-render" style="position: absolute; left: -9999px; top: 0; width: 600px; background: #ffffff; padding: 32px; font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif; box-shadow: none;">
  <div id="share-card-inner">
    <!-- Header: Title + meta -->
    <div style="border-bottom:2px solid #e0e0e0; padding-bottom:10px; min-height:55px; margin-bottom:20px; position:relative;">
      <img src="{{ "images/logo.png" | relURL }}" alt="" style="position:absolute;right:0px;top:-55px;height:90px;width:auto;object-fit:contain;pointer-events:none;">
      <h2 id="share-card-title" style="font-size:22px;font-weight:700;color:#1a1a1a;margin:0 100px 10px 0;line-height:1.4;"></h2>
      <div id="share-card-meta" style="font-size: 13px; color: #888;">
        <span id="share-card-date"></span>
        <span style="margin: 0 6px;">·</span>
        <span id="share-card-author"></span>
      </div>
    </div>
    <!-- Body: article content -->
    <div id="share-card-body" style="font-size: 15px; line-height: 1.8; color: #333333;"></div>
    <!-- Footer: site name + QR code (QR sits on top of deco image) -->
    <div style="border-top: 1px solid #e0e0e0; margin-top: 20px; padding-top: 16px; display: flex; align-items: flex-end; justify-content: space-between;">
      <div>
        <div style="font-size: 14px; font-weight: 600; color: #333;">{{ site.Title }}</div>
        <div style="font-size: 11px; color: #aaa; margin-top: 2px;">扫码阅读原文</div>
      </div>
      <div style="position: relative; background: #ffffff; padding: 4px; border-radius: 0;">
        <img id="share-card-qrcode" src="" alt="QR Code" style="width: 80px; height: 80px; display: block; border-radius: 0;" />
      </div>
    </div>
  </div>
</div>

<!-- Modal for displaying the generated image -->
<div id="share-card-modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
  <div style="position: relative; max-width: 90vw; max-height: 90vh;">
    <button onclick="closeShareModal()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
    <img id="share-card-image" src="" alt="分享图片" style="max-width: 90vw; max-height: 85vh; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);" />
    <div style="text-align: center; margin-top: 12px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
      <button id="share-card-share-btn" onclick="shareCardImage()" style="background: #4a90d9; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s;">
        📤 一键分享
      </button>
      <button id="share-card-copy-btn" onclick="copyShareCard(this)" style="background: #fff; color: #4a90d9; border: 1px solid #4a90d9; padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s;">
        📋 复制图片
      </button>
      <button onclick="downloadShareCard()" style="background: #fff; color: #333; border: 1px solid #d0d0d0; padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s;">
        💾 保存图片
      </button>
    </div>
  </div>
</div>
